<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Music Player</title>
  <link rel="stylesheet" href="styles.css">
  <!-- 引入 DPlayer 样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">
  <!-- 自定义标题栏 -->
  <div class="title-bar">
    <div class="title-bar-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
        <span>Cloud Music</span>
      </div>
    </div>
    <div class="title-bar-center">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" placeholder="搜索本地音乐..." id="searchInput">
      </div>
    </div>
    <div class="title-bar-right">
      <button class="theme-btn" id="themeBtn" title="切换主题">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
      </button>
      <button class="window-btn" id="minimizeBtn" title="最小化">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 13H5v-2h14v2z"/>
        </svg>
      </button>
      <button class="window-btn" id="maximizeBtn" title="最大化">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
      <button class="window-btn close-btn" id="closeBtn" title="关闭">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="main-container">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <div class="nav-section">
        <h3>我的音乐</h3>
        <ul class="nav-list">
          <li class="nav-item active" data-view="local">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
            </svg>
            <span>本地音乐</span>
          </li>
          <li class="nav-item" data-view="online">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
            </svg>
            <span>网络电台</span>
          </li>
          <!-- 新增B站视频导航项 -->
          <li class="nav-item" data-view="bilibili">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 6h-2V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-8-2h4v2h-4V4zm8 16H6V8h12v10zM8 10h8v2H8v-2zm0 4h8v2H8v-2zm0 4h8v2H8v-2z"/>
            </svg>
            <span>B站视频</span>
          </li>
        </ul>
      </div>
      
      <div class="nav-section">
        <h3>创建的歌单</h3>
        <ul class="nav-list">
          <li class="nav-item" data-view="favorite">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            <span>我喜欢的音乐</span>
          </li>
        </ul>
      </div>

      <div class="nav-section theme-section">
        <h3>主题</h3>
        <div class="theme-list">
          <div class="theme-item" data-theme="dark" title="深邃黑">
            <div class="theme-preview theme-dark"></div>
            <span>深邃黑</span>
          </div>
          <div class="theme-item" data-theme="red" title="网易云红">
            <div class="theme-preview theme-red"></div>
            <span>网易云红</span>
          </div>
          <div class="theme-item" data-theme="blue" title="海洋蓝">
            <div class="theme-preview theme-blue"></div>
            <span>海洋蓝</span>
          </div>
          <div class="theme-item" data-theme="purple" title="梦幻紫">
            <div class="theme-preview theme-purple"></div>
            <span>梦幻紫</span>
          </div>
          <div class="theme-item" data-theme="green" title="森林绿">
            <div class="theme-preview theme-green"></div>
            <span>森林绿</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="content">
      <!-- 本地音乐视图 -->
      <div class="view active" id="localView">
        <div class="view-header">
          <h1>本地音乐</h1>
          <div class="header-actions">
            <button class="btn btn-primary" id="addMusicBtn">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
              </svg>
              添加音乐
            </button>
            <button class="btn btn-secondary" id="scanFolderBtn">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
              </svg>
              扫描文件夹
            </button>
          </div>
        </div>
        <div class="music-stats" id="musicStats">
          <span>共 <strong>0</strong> 首歌曲</span>
          <span>总时长 <strong>00:00</strong></span>
        </div>
        <div class="music-list-container">
          <div class="music-list-header">
            <span class="col-index">#</span>
            <span class="col-title">标题</span>
            <span class="col-artist">歌手</span>
            <span class="col-album">专辑</span>
            <span class="col-duration">时长</span>
            <span class="col-lyric">歌词</span>
            <span class="col-action">操作</span>
          </div>
          <div class="music-list" id="musicList">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
              </svg>
              <p>暂无音乐，点击"添加音乐"或"扫描文件夹"</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 网络电台视图 -->
      <div class="view" id="onlineView">
        <div class="view-header">
          <h1>网络电台</h1>
          <div class="header-actions">
            <button class="btn btn-primary" id="addOnlineBtn">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
              </svg>
              添加链接
            </button>
          </div>
        </div>
        <div class="online-stats" id="onlineStats">
          <span>共 <strong>0</strong> 个链接</span>
        </div>
        <div class="online-list-container">
          <div class="online-list" id="onlineList">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
              </svg>
              <p>暂无网络链接，点击"添加链接"</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 新增B站视频视图 -->
      <div class="view" id="bilibiliView">
        <div class="view-header">
          <h1>B站视频</h1>
          <div class="header-actions" style="display: flex; gap: 10px;">
            <input type="text" id="bvInput" placeholder="输入 BV/AV 号或链接..." style="width: 300px; padding: 8px 16px; background: var(--bg-hover); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-primary); outline: none;">
            <button class="btn btn-primary" id="loadVideoBtn">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M8 5v14l11-7z"/>
              </svg>
              播放
            </button>
          </div>
        </div>

        <!-- 视频播放器容器 -->
        <div class="video-container" style="width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px;">
          <div id="dplayer" style="width: 100%; height: 100%;"></div>
        </div>

        <!-- 视频信息区域 -->
        <div class="video-info-card" id="videoInfoCard" style="display: none; padding: 16px; background: var(--bg-card); border-radius: 12px; margin-bottom: 20px;">
          <div style="display: flex; gap: 20px;">
            <img id="videoCover" src="" alt="封面" style="width: 120px; height: 75px; object-fit: cover; border-radius: 8px;">
            <div style="flex: 1;">
              <h3 id="videoTitle" style="margin-bottom: 8px; font-size: 18px;"></h3>
              <p id="videoOwner" style="color: var(--text-secondary); font-size: 14px;"></p>
              <p id="videoDesc" style="color: var(--text-tertiary); font-size: 13px; margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"></p>
            </div>
          </div>
        </div>

        <!-- 清晰度和分P选择 -->
        <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <label style="color: var(--text-secondary);">清晰度:</label>
            <select id="qualitySelect" style="background: var(--bg-hover); border: 1px solid var(--border-color); color: var(--text-primary); padding: 6px 12px; border-radius: 6px;">
              <option value="127">8K</option>
              <option value="126">杜比视界</option>
              <option value="125">HDR</option>
              <option value="120">4K</option>
              <option value="116">1080P60</option>
              <option value="80" selected>1080P</option>
              <option value="64">720P</option>
              <option value="32">480P</option>
              <option value="16">360P</option>
            </select>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <label style="color: var(--text-secondary);">分P:</label>
            <select id="pageSelect" style="background: var(--bg-hover); border: 1px solid var(--border-color); color: var(--text-primary); padding: 6px 12px; border-radius: 6px;">
              <option value="">加载视频后可选</option>
            </select>
          </div>
        </div>

        <!-- 播放列表 -->
        <div class="playlist-section">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h3 style="font-size: 16px;">播放列表</h3>
            <button class="btn btn-secondary" id="clearBiliPlaylistBtn" style="padding: 4px 12px; font-size: 12px;">清空</button>
          </div>
          <div class="bili-playlist" id="biliPlaylist" style="background: var(--bg-card); border-radius: 8px; max-height: 200px; overflow-y: auto;">
            <!-- 动态渲染 -->
            <div class="empty-playlist" style="padding: 20px; text-align: center; color: var(--text-tertiary);">暂无视频</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 底部播放器 -->
  <div class="player-bar">
    <div class="player-left">
      <div class="current-song" id="currentSong">
        <div class="song-cover" id="songCover">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
        </div>
        <div class="song-info">
          <span class="song-name" id="songName">未播放</span>
          <span class="song-artist" id="songArtist">-</span>
        </div>
        <button class="like-btn" id="likeBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </button>
      </div>
    </div>
    
    <div class="player-center">
      <div class="player-controls">
        <button class="control-btn" id="playModeBtn" title="播放模式">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7z"/>
          </svg>
        </button>
        <button class="control-btn" id="prevBtn" title="上一首">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button class="control-btn play-btn" id="playBtn" title="播放/暂停">
          <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg viewBox="0 0 24 24" fill="currentColor" id="pauseIcon" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button class="control-btn" id="nextBtn" title="下一首">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
        <button class="control-btn" id="lyricsBtn" title="桌面歌词">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
          </svg>
        </button>
      </div>
      <div class="progress-container">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-handle" id="progressHandle"></div>
        </div>
        <span class="time" id="totalTime">0:00</span>
      </div>
    </div>
    
    <div class="player-right">
      <button class="control-btn volume-btn" id="volumeBtn">
        <svg viewBox="0 0 24 24" fill="currentColor" id="volumeIcon">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </button>
      <div class="volume-slider" id="volumeSlider">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
      <button class="control-btn playlist-btn" id="playlistBtn" title="播放列表">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 10h12v2H4zm0-4h12v2H4zm0 8h8v2H4zm10 0v6l5-3z"/>
        </svg>
      </button>
    </div>
  </div>

  <audio id="audioPlayer" preload="metadata"></audio>

  <!-- 歌词设置弹窗 -->
  <div class="modal" id="lyricModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>歌词设置</h3>
        <button class="modal-close" id="closeLyricModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="lyric-options">
          <div class="lyric-status" id="lyricStatus">
            <span class="status-badge no-lyric">无歌词</span>
          </div>
          <button class="btn btn-primary" id="loadLyricBtn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/>
            </svg>
            手动加载歌词
          </button>
          <button class="btn btn-secondary" id="autoFindLyricBtn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            自动查找歌词
          </button>
          <div class="lyric-info" id="lyricInfo">
            <p>当前歌词: <span id="currentLyricFile">无</span></p>
          </div>
          <div class="lyric-preview" id="lyricPreview">
            <p>歌词预览将显示在这里...</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="clearLyricBtn">清除绑定</button>
        <button class="btn btn-primary" id="showDesktopLyricsBtn">显示桌面歌词</button>
      </div>
    </div>
  </div>

  <!-- 播放列表侧边栏 -->
  <div class="playlist-sidebar" id="playlistSidebar">
    <div class="playlist-header">
      <h3>播放列表</h3>
      <button class="close-playlist" id="closePlaylist">&times;</button>
    </div>
    <div class="playlist-content" id="playlistContent">
      <div class="empty-playlist">
        <p>播放列表为空</p>
      </div>
    </div>
  </div>

  <!-- 网络电台添加链接的输入模态框 -->
  <div class="modal" id="onlineInputModal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h3>添加网络链接</h3>
        <button class="modal-close" id="closeOnlineInputModal">&times;</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary);">链接名称</label>
          <input type="text" id="onlineLinkName" placeholder="例如：在线电台" style="width: 100%; padding: 8px 12px; background: var(--bg-hover); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); outline: none;">
        </div>
        <div style="margin-bottom: 8px;">
          <label style="display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary);">音频链接</label>
          <input type="url" id="onlineLinkUrl" placeholder="https://example.com/audio.mp3 或任意网页链接" style="width: 100%; padding: 8px 12px; background: var(--bg-hover); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); outline: none;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelOnlineInput">取消</button>
        <button class="btn btn-primary" id="saveOnlineLink">保存</button>
      </div>
    </div>
  </div>

  <!-- 引入脚本 -->
  <!-- DPlayer 核心库 -->
  <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
  <!-- HLS.js 辅助 DASH 播放 -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <!-- BV/AV 编解码器 -->
  <script src="bvcodec.js"></script>
